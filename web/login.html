<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherGate Pro - 网关安全认证</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080c18;
            --glass-bg: rgba(13, 20, 38, 0.45);
            --glass-border: rgba(255, 255, 255, 0.05);
            --primary: #8b5cf6;
            --primary-gradient: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --danger: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 30%, rgba(30, 27, 75, 0.45) 0%, var(--bg-color) 80%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        /* Abstract glowing orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }
        .orb-1 {
            width: 450px;
            height: 450px;
            background: rgba(139, 92, 246, 0.25);
            top: -150px;
            left: -150px;
        }
        .orb-2 {
            width: 450px;
            height: 450px;
            background: rgba(236, 72, 153, 0.15);
            bottom: -150px;
            right: -100px;
        }

        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 430px;
            padding: 3rem 2.5rem;
            border-radius: 28px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.15) 0%, rgba(124, 58, 237, 0.15) 100%);
            border: 1px solid rgba(167, 139, 250, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #c084fc;
            margin-bottom: 1.25rem;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.25);
        }
        .logo-icon svg {
            width: 30px;
            height: 30px;
        }

        .brand-section h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.125rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            margin-bottom: 0.375rem;
            line-height: 1.2;
        }
        .brand-section h1 span {
            background: linear-gradient(to right, #c084fc, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-section p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border-radius: 16px;
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
            background: rgba(10, 15, 30, 0.9);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.35);
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(124, 58, 237, 0.45);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-box {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--danger);
            padding: 0.875rem;
            border-radius: 14px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
            font-weight: 600;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="ambient-glow" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; z-index: 0;">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="login-card">
        <div class="brand-section">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                </svg>
            </div>
            <h1>AetherGate <span>Pro</span></h1>
            <p>高可用独立网络命名空间路由网关</p>
        </div>
        
        <div id="error-msg" class="error-box"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">管理员账户</label>
                <input type="text" id="username" class="form-control" placeholder="输入控制台用户名" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">控制密码</label>
                <input type="password" id="password" class="form-control" placeholder="输入控制台密码" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-submit">
                认证登录
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById("login-form");
        const errorMsg = document.getElementById("error-msg");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorMsg.style.display = "none";
            
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            
            // Extract secret path prefix if present
            const secretPath = window.location.pathname.split("/")[1] || "";
            const apiPrefix = secretPath && secretPath !== "index.html" && secretPath !== "login.html" ? `/${secretPath}` : "";

            try {
                const res = await fetch(`${apiPrefix}/api/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.reload();
                } else {
                    errorMsg.textContent = data.error || "账户验证错误，请重新输入";
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                errorMsg.textContent = "网关服务端通信超时，请检查服务状态";
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
